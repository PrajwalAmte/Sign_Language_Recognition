services:
  preprocess:
    build: .
    command: python -m src.preprocess
    volumes:
      - raw-data:/app/data/raw
      - processed-data:/app/data/processed

  train:
    build: .
    command: python -m src.train
    volumes:
      - processed-data:/app/data/processed
      - model-data:/app/models
      - metrics-data:/app/metrics
      - mlflow-data:/app/mlruns
    depends_on:
      preprocess:
        condition: service_completed_successfully

  evaluate:
    build: .
    command: python -m src.evaluate
    volumes:
      - processed-data:/app/data/processed
      - model-data:/app/models
      - metrics-data:/app/metrics
    depends_on:
      train:
        condition: service_completed_successfully

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - model-data:/app/models
      - logs-data:/app/logs
    depends_on:
      train:
        condition: service_completed_successfully

  mlflow:
    build: .
    command: mlflow ui --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/app/mlruns

volumes:
  model-data:
  metrics-data:
  mlflow-data:
  logs-data:
  processed-data:
  raw-data:

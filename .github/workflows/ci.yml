name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify imports and code structure
        run: |
          python -c "from src.preprocess import main; print('✓ src.preprocess')"
          python -c "from src.train import main, build_model; print('✓ src.train')"
          python -c "from src.evaluate import main, LABELS; print('✓ src.evaluate')"
          python -c "from api.main import app; print('✓ api.main')"
          python -c "from api.model import SignPredictor; print('✓ api.model')"
          python -c "from api.schemas import PixelRequest, PredictionResponse; print('✓ api.schemas')"
          python -c "from monitoring.logger import PredictionLogger; print('✓ monitoring.logger')"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sign-language-recognition .
